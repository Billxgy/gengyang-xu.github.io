<!-- Support for MatJax -->
<script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

{% if site.visitor_map.enabled and site.visitor_map.provider == "clustrmaps" and site.visitor_map.clustrmaps_id != "" %}
<style>
    .footer-clustrmaps {
        margin: 1rem auto 0 auto;
        text-align: center;
        width: 260px;
        max-width: 100%;
        min-height: 170px;
        overflow: hidden;
    }

    .footer-clustrmaps #clustrmaps,
    .footer-clustrmaps #clustrmaps-widget-v2,
    .footer-clustrmaps #clustrmaps-widget-v2 > div {
        position: static !important;
        right: auto !important;
        bottom: auto !important;
        left: auto !important;
        margin: 0 auto !important;
        transform: none !important;
    }
</style>
<div class="footer-clustrmaps">
    <script type="text/javascript" id="clustrmaps" src="//clustrmaps.com/map_v2.js?d=dS34j-rmpJvs-r249OPWkG6Bz_w0Cy6OhnLKvF4e_ZQ&cl=ffffff&w=260"></script>
</div>
